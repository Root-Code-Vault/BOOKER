spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://booker-product-db:5432/booker-product-db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org:
      springframework:
        jdbc: DEBUG
        orm: DEBUG

server:
  port: 9094

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:9090/eureka/
    register-with-eureka: true
    fetch-registry: true