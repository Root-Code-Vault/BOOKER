services:
  # --- DATABASES ---
  booker-auth-db:
    image: postgres:latest
    container_name: booker-auth-db
    environment:
      POSTGRES_DB: booker-auth-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5000:5432"
    volumes:
      - ./data/auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booker-auth-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booker-network

  booker-product-db:
    image: postgres:latest
    container_name: booker-product-db
    environment:
      POSTGRES_DB: booker-product-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5001:5432"
    volumes:
      - ./data/product:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booker-product-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booker-network

  booker-payment-db:
    image: postgres:latest
    container_name: booker-payment-db
    environment:
      POSTGRES_DB: booker-payment-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5002:5432"
    volumes:
      - ./data/payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booker-payment-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booker-network

  booker-seat-db:
    image: postgres:latest
    container_name: booker-seat-db
    environment:
      POSTGRES_DB: booker-seat-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5003:5432"
    volumes:
      - ./data/seat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booker-seat-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booker-network

  booker-booking-db:
    image: postgres:latest
    container_name: booker-booking-db
    environment:
      POSTGRES_DB: booker-booking-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5004:5432"
    volumes:
      - ./data/booking:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booker-booking-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booker-network

  # --- DATABASE: REDIS CACHE ---
  booker-redis-container:
    image: redis:latest
    container_name: booker-redis-container
    ports:
      - "6379:6379"
    networks:
      - booker-network

  # --- MESSAGING ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: booker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - booker-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: booker-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - booker-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: booker-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
    networks:
      - booker-network

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: booker-kafdrop
    depends_on:
      - kafka
    ports:
      - "8080:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      SCHEMAREGISTRY_CONNECT: http://schema-registry:8081
    networks:
      - booker-network

networks:
  booker-network:
    name: booker-network
    driver: bridge
